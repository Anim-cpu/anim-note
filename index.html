  <script>
function renderList(id, jsonFile, limit) {
  (async function(){
    var list = document.getElementById(id);
    if (!list) return;
    try {
      var res = await fetch(jsonFile, { cache: 'no-store' });
      var data = await res.json();
      var posts = data.posts || [];
      if (limit) posts = posts.slice(0, limit);
      if (posts.length === 0) { list.innerHTML = '<p class="note-loading">まだありません。</p>'; return; }
      list.innerHTML = posts.map(function(p){
        var img = p.thumbnail ? '<img src="'+p.thumbnail+'" alt="">' : '';
        var sub = p.date + (p.desc ? ' ・ ' + p.desc : '');
        return '<a class="note-item" href="'+p.link+'" target="_blank" rel="noopener">'+img+
          '<div class="n-body"><p class="n-title">'+p.title+'</p><p class="n-date">'+sub+'</p></div></a>';
      }).join('');
    } catch(e) {
      list.innerHTML = '<p class="note-loading">読み込めませんでした。</p>';
    }
  })();
}
renderList('tools-list', 'tools.json', 5);
renderList('code-list', 'code.json', 5);
renderList('note-list', 'note.json', 0);
</script>
