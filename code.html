<meta charset="UTF-8">

<title>Code | NekoZ Note</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root { --ink: #e8e6e2; --muted: #8a8a96; --line: rgba(255,255,255,0.12); }
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background:
    radial-gradient(ellipse at 70% -10%, #1b2342 0%, transparent 55%),
    radial-gradient(ellipse at 10% 110%, #241a33 0%, transparent 55%),
    linear-gradient(#05060d 0%, #0a0c18 60%, #04040a 100%);
  background-attachment: fixed;
  color: var(--ink);
  font-family: "Noto Sans JP", sans-serif;
  font-weight: 300; line-height: 1.9; letter-spacing: 0.04em;
  -webkit-font-smoothing: antialiased; min-height: 100vh; position: relative;
}
a { color: inherit; text-decoration: none; }
#stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
#clouds {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background:
    radial-gradient(ellipse 55% 40% at 22% 28%, rgba(30,34,56,0.9), transparent 72%),
    radial-gradient(ellipse 50% 38% at 78% 38%, rgba(24,22,40,0.9), transparent 72%),
    radial-gradient(ellipse 65% 42% at 55% 72%, rgba(22,28,50,0.9), transparent 72%),
    #04050b;
  -webkit-mask-image: radial-gradient(circle var(--r,200px) at var(--mx,-500px) var(--my,-500px), transparent 0%, transparent 30%, black 78%);
  mask-image: radial-gradient(circle var(--r,200px) at var(--mx,-500px) var(--my,-500px), transparent 0%, transparent 30%, black 78%);
}
.page { position: relative; z-index: 2; padding: 0 48px; max-width: 1100px; margin: 0 auto; }
header { padding: 56px 0 0; display: flex; justify-content: space-between; align-items: flex-start; }
.intro h1 { font-size: 1rem; font-weight: 400; letter-spacing: 0.1em; }
.intro h1 a { transition: text-shadow 0.25s; }
.intro h1 a:hover { text-shadow: 0 0 12px rgba(200,210,255,0.6); }
.intro .lead-1 { margin-top: 18px; font-size: 0.9rem; }
.nav-corner { font-size: 0.78rem; color: var(--muted); transition: color 0.2s; text-align: right; }
.nav-corner a:hover { color: var(--ink); }
.section-label { margin-top: 80px; font-size: 0.82rem; color: var(--muted); border-bottom: 1px solid var(--line); padding-bottom: 8px; }
.code-list { margin-top: 8px; }
.code-item { display: flex; gap: 24px; align-items: center; padding: 22px 0; border-bottom: 1px solid var(--line); }
.code-item img { flex: 0 0 120px; width: 120px; height: 68px; object-fit: cover; border-radius: 4px; background: rgba(255,255,255,0.05); }
.code-item .c-body { flex: 1; }
.code-item .c-title { font-size: 0.92rem; }
.code-item .c-date { color: var(--muted); font-size: 0.75rem; margin-top: 4px; }
.code-item .c-links { display: flex; gap: 10px; margin-top: 10px; }
.c-btn {
  display: inline-flex; align-items: center; gap: 7px; padding: 6px 14px; font-size: 0.74rem;
  border: 1px solid var(--line); border-radius: 4px; color: var(--ink);
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
}
.c-btn:hover { border-color: rgba(200,210,255,0.5); box-shadow: 0 0 14px rgba(120,140,220,0.2); transform: translateY(-2px); }
.note-loading { color: var(--muted); font-size: 0.82rem; padding: 20px 0; }
footer { padding: 80px 0 48px; color: var(--muted); font-size: 0.78rem; }
@media (max-width: 600px) {
  .page { padding: 0 24px; }
  header { flex-direction: column; }
  .nav-corner { margin-top: 24px; text-align: left; }
  .code-item { flex-direction: column; align-items: flex-start; gap: 12px; }
  .code-item img { flex-basis: auto; width: 100%; height: 160px; }
}
</style>
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NDKJJZSH" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <canvas id="stars"></canvas>
  <div id="clouds"></div>

  <div class="page">
    <header>
      <div class="intro">
        <h1><a href="index.html">NekoZ Note</a></h1>
        <p class="lead-1">コードの記録</p>
      </div>
      <div class="nav-corner"><a href="index.html">INDEX</a></div>
    </header>

    <p class="section-label">Code Archive</p>
    <div class="code-list" id="code-list">
      <p class="note-loading">読み込み中…</p>
    </div>

    <footer>© NekoZ Note</footer>
  </div>

  <script src="effect.js"></script>
  <script>
(async function loadCode() {
  var list = document.getElementById('code-list');
  if (!list) return;
  try {
    var res = await fetch('code.json', { cache: 'no-store' });
    var data = await res.json();
    var posts = data.posts || [];
    if (posts.length === 0) {
      list.innerHTML = '<p class="note-loading">まだ記録がありません。note に投稿すると自動で並びます。</p>';
      return;
    }
    list.innerHTML = posts.map(function(p){
      var ghBtn = p.github ? '<a class="c-btn" href="' + p.github + '" target="_blank" rel="noopener">GitHub</a>' : '';
      var img = p.thumbnail ? '<img src="' + p.thumbnail + '" alt="">' : '';
      return '<div class="code-item">' + img +
        '<div class="c-body">' +
          '<p class="c-title">' + p.title + '</p>' +
          '<p class="c-date">' + p.date + '</p>' +
          '<div class="c-links">' +
            '<a class="c-btn" href="' + p.link + '" target="_blank" rel="noopener">note で読む</a>' +
            ghBtn +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  } catch (e) {
    list.innerHTML = '<p class="note-loading">読み込めませんでした。</p>';
  }
})();
</script>
</body>
</html>
