name: Update code feed

on:
  schedule:
    - cron: "10 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4
      - name: Node.js を準備
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: note(yoru_nekoz) の RSS を取得して code.json を作成
        run: node fetch-code.mjs
      - name: 変更があればコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add code.json
          if git diff --staged --quiet; then
            echo "更新なし"
          else
            git commit -m "code feed を自動更新"
            git push
          fi
