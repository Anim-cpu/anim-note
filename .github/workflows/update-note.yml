name: Update note feed

# 実行タイミング：1日1回（UTC22:00 = 日本時間 朝7:00）＋手動実行ボタン
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

# リポジトリへ書き込む権限を与える
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Node.js を準備
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: note の RSS を取得して note.json を作成
        run: node fetch-note.mjs

      - name: 変更があればコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add note.json
          if git diff --staged --quiet; then
            echo "更新なし"
          else
            git commit -m "note feed を自動更新"
            git push
          fi
