<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | NekoZ Note</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
:root { --ink: #e8e6e2; --muted: #8a8a96; --line: rgba(255,255,255,0.12); }
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background:
    radial-gradient(ellipse at 70% -10%, #1b2342 0%, transparent 55%),
    radial-gradient(ellipse at 10% 110%, #241a33 0%, transparent 55%),
    linear-gradient(#05060d 0%, #0a0c18 60%, #04040a 100%);
  background-attachment: fixed;
  color: var(--ink);
  font-family: "Noto Sans JP", sans-serif;
  font-weight: 300; line-height: 1.9; letter-spacing: 0.04em;
  -webkit-font-smoothing: antialiased; min-height: 100vh; position: relative;
}
a { color: inherit; text-decoration: none; }
#stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
#clouds {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background:
    radial-gradient(ellipse 55% 40% at 22% 28%, rgba(30,34,56,0.9), transparent 72%),
    radial-gradient(ellipse 50% 38% at 78% 38%, rgba(24,22,40,0.9), transparent 72%),
    radial-gradient(ellipse 65% 42% at 55% 72%, rgba(22,28,50,0.9), transparent 72%),
    radial-gradient(ellipse 45% 40% at 32% 88%, rgba(28,32,54,0.9), transparent 72%),
    #04050b;
  -webkit-mask-image: radial-gradient(circle var(--r,200px) at var(--mx,-500px) var(--my,-500px), transparent 0%, transparent 30%, black 78%);
  mask-image: radial-gradient(circle var(--r,200px) at var(--mx,-500px) var(--my,-500px), transparent 0%, transparent 30%, black 78%);
}
.page { position: relative; z-index: 2; padding: 0 48px; max-width: 1100px; margin: 0 auto; }
header { padding: 56px 0 0; display: flex; justify-content: space-between; align-items: flex-start; }
.intro h1 { font-size: 1rem; font-weight: 400; letter-spacing: 0.1em; }
.intro h1 a { transition: text-shadow 0.25s; }
.intro h1 a:hover { text-shadow: 0 0 12px rgba(200,210,255,0.6); }
.nav-corner { font-size: 0.78rem; color: var(--muted); transition: color 0.2s; text-align: right; }
.nav-corner a:hover { color: var(--ink); }
.section-label { margin-top: 40px; font-size: 0.82rem; color: var(--muted); border-bottom: 1px solid var(--line); padding-bottom: 8px; }
.form-wrap { margin-top: 24px; max-width: 560px; }
.form-wrap .lead { color: var(--muted); font-size: 0.85rem; margin-bottom: 40px; }
.field { margin-bottom: 28px; }
.field label { display: block; font-size: 0.8rem; margin-bottom: 8px; }
.field input, .field textarea {
  width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--line);
  border-radius: 4px; color: var(--ink); font-family: inherit; font-size: 0.9rem;
  font-weight: 300; padding: 12px 14px; transition: border-color 0.25s, box-shadow 0.25s;
}
.field input:focus, .field textarea:focus { outline: none; border-color: rgba(200,210,255,0.5); box-shadow: 0 0 12px rgba(120,140,220,0.2); }
.field textarea { resize: vertical; min-height: 140px; }
.submit-btn {
  background: rgba(255,255,255,0.06); border: 1px solid var(--line); border-radius: 4px;
  color: var(--ink); font-family: inherit; font-size: 0.85rem; letter-spacing: 0.08em;
  padding: 12px 32px; cursor: pointer; transition: background 0.25s, box-shadow 0.25s;
}
.submit-btn:hover { background: rgba(255,255,255,0.12); box-shadow: 0 0 16px rgba(120,140,220,0.25); }
footer { padding: 80px 0 48px; color: var(--muted); font-size: 0.78rem; }
@media (max-width: 600px) {
  .page { padding: 0 24px; }
  header { flex-direction: column; }
  .nav-corner { margin-top: 24px; text-align: left; }
}
</style>
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NDKJJZSH" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->
  <canvas id="stars"></canvas>
  <div id="clouds"></div>

  <div class="page">
    <header>
      <div class="intro">
        <h1><a href="index.html">NekoZ Note</a></h1>
      </div>
      <div class="nav-corner"><a href="index.html">INDEX</a></div>
    </header>

    <div class="form-wrap">
      <p class="section-label">Contact</p>
      <p class="lead" style="margin-top:24px;">お問い合わせはこちらから。いただいた内容はメールでお返事します。</p>

      <!-- ↓ action="" に自分のFormspreeのURLを入れてください -->
      <form action="https://formspree.io/f/ここにあなたのID" method="POST">
        <div class="field">
          <label for="name">お名前</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="field">
          <label for="email">メールアドレス</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="field">
          <label for="message">メッセージ</label>
          <textarea id="message" name="message" required></textarea>
        </div>
        <button type="submit" class="submit-btn">送信する</button>
      </form>
    </div>

    <footer>© NekoZ Note</footer>
  </div>

  <script src="effect.js"></script>
</body>
</html>
